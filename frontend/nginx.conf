server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets (JS, CSS, images) — safe to cache long-term since filenames change on rebuild
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes fall back to index.html (SPA routing)
    # No-cache ensures the browser always fetches fresh index.html after deploys
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy API requests to backend
    location /api {
        proxy_pass http://backend:8005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check
    location /health {
        proxy_pass http://backend:8005;
    }
}
